<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="css/grid.css" rel="stylesheet">
    <link href="css/main.css" rel="stylesheet">
    <title>Dr.Nut - Contact</title>
</head>

<body>

<h1 class="visually-hidden">Dr.Nut Contact Page</h1>

<header class="grid-con center-grid-con header">

    <div class="col-span-1 hamburger" id="button">
        <img src="images/burger.svg" alt="hamburgerMenu">
    </div>

    <div class="col-span-2 m-col-span-3 logo">
        <img src="images/Final_Logo.png" alt="logo">
    </div>

    <nav class="col-span-full m-col-span-9 nav" id="burger-con">
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="#">Flavors</a></li>
            <li><a href="#">About</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="#">Order Now</a></li>
        </ul>
    </nav>

</header>

<section class="grid-con center-grid-con contact-hero">

    <h2 class="visually-hidden">contact us</h2>
    <div class="col-span-full">
        <h2>Contact Us</h2>
        <p>We would love to hear from you.</p>
    </div>

</section>

<section class="grid-con center-grid-con contact-content">

    <h2 class="visually-hidden">get in touch</h2>
    <div class="col-span-full m-col-span-5 contact-info">
        <h3>Get in Touch</h3>
        <p><strong>Email:</strong> Dr.Nut.com</p>
        <p><strong>Phone:</strong> +1 (123)-4567</p>
        <p><strong>Address:</strong> 123 Soda Street, Toronto, Canada</p>

        <div class="box map-placeholder">
            Map Placeholder
        </div>
    </div>

    <div class="col-span-full m-col-span-7 contact-form">
        <h3>Send Us a Message</h3>

        <form>
            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your name">

            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="Enter your email">

            <label for="message">Message</label>
            <textarea id="message" rows="5" placeholder="Write your message"></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>

</section>

<footer class="grid-con center-grid-con">
    <div class="box col-span-full">Footer</div>
</footer>

<script src="js/main.js"></script>
</body>
</html>
